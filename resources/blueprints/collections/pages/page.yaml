title: Page
tabs:
  main:
    display: Inhalt
    sections:
      -
        display: Inhalt
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              localizable: true
              validate:
                - required
              display: Titel
          -
            handle: page_elements
            field:
              localizable: true
              type: replicator
              display: Inhalte
              sets:
                content:
                  display: Inhalte
                  sets:
                    editor:
                      display: Editor
                      icon: text-formatting-markdown
                      fields:
                        -
                          import: editor
                    teasers:
                      display: Teasers
                      icon: media-image-picture-gallery
                      fields:
                        -
                          import: teasers
                    mediareports:
                      display: Medienberichte
                      instructions: 'Medienberichte hinzufügen.'
                      icon: text-formatting-image-top
                      fields:
                        -
                          import: mediareports
                    partner:
                      display: Partner-Logos
                      instructions: 'Partner-Logos hinzufügen'
                      icon: media-image-picture-gallery
                      fields:
                        -
                          import: partners
  media:
    display: Medien
    sections:
      -
        display: Medien
        instructions: 'Bilder / Videos hinzufügen'
        fields:
          -
            import: media
  seo:
    display: SEO
    sections:
      -
        display: SEO
        fields:
          -
            handle: open_graph_title
            field:
              localizable: true
              type: text
              display: Title
              instructions: 'Can be used as a replacement for the page title'
              instructions_position: below
          -
            handle: open_graph_description
            field:
              localizable: true
              type: textarea
              display: Description
              instructions_position: below
              instructions: 'One or two descriptive sentences about the content of the page.'
          -
            handle: open_graph_image
            field:
              localizable: true
              max_files: 1
              container: assets
              type: assets
              display: Image
              instructions_position: below
              folder: images
              instructions: 'Image used for sharing on social media.'
  settings:
    display: Settings
    sections:
      -
        display: Settings
        fields:
          -
            handle: css_class
            field:
              options:
                contact: Kontakt
              type: select
              display: 'CSS Klasse'
              localizable: false
          -
            handle: template
            field:
              type: template
              display: Template
              localizable: true
          -
            handle: layout
            field:
              type: template
              display: Layout
              localizable: false
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
              show_regenerate: true
          -
            handle: parent
            field:
              type: entries
              collections:
                - pages
              max_items: 1
              listable: false
              localizable: true
